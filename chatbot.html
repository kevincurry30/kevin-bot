<!DOCTYPE html>
<html>
<head>
  <title>Kevin Goon Bot - Enhanced</title>
  <style>
    #chatbox {
      width: 400px;
      height: 300px;
      border: 1px solid #ccc;
      overflow-y: scroll;
      padding: 10px;
    }
    #userinput {
      width: 300px;
    }
    #adminPanel {
      display: none; /* Hidden by default */
      border: 1px solid #aaa;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>Kevin Goon Bot - Enhanced</h1>

  <div id="chatbox">
    <p><strong>Kevin Goon Bot:</strong> Greetings, fleshy human! Ask me anything... if you dare.</p>
  </div>

  <input type="text" id="userinput" placeholder="Type your message...">
  <button onclick="sendMessage()">Send</button>

  <div id="adminPanel">
    <h2>Admin Panel - ACCESS GRANTED</h2>
    <label for="botName">Bot Name:</label>
    <input type="text" id="botName" value="Kevin Goon Bot"><br><br>

    <label for="greeting">Greeting:</label>
    <input type="text" id="greeting" value="Greetings, fleshy human! Ask me anything... if you dare."><br><br>

    <label for="unfilteredAI">Unfiltered AI (WARNING!):</label>
    <input type="checkbox" id="unfilteredAI"><br><br>

    <button onclick="saveAdminChanges()">Save Changes</button>
  </div>

  <script>
    let isAdmin = false;
    let unfilteredMode = false;

    function sendMessage() {
      var userInput = document.getElementById("userinput").value;
      document.getElementById("userinput").value = "";

      var chatbox = document.getElementById("chatbox");
      var userMessage = document.createElement("p");
      userMessage.innerHTML = "<strong>You:</strong> " + userInput;
      chatbox.appendChild(userMessage);

      let aiResponse = getAIResponse(userInput);
      var aiMessage = document.createElement("p");
      aiMessage.innerHTML = "<strong>Kevin Goon Bot:</strong> " + aiResponse;
      chatbox.appendChild(aiMessage);

      chatbox.scrollTop = chatbox.scrollHeight;
    }

    function getAIResponse(userInput) {
      userInput = userInput.toLowerCase();

      if (userInput === "/admin") {
        // Admin Command
        let code = prompt("Enter admin code:");
        if (code === "kevinbryant") {
          isAdmin = true;
          document.getElementById("adminPanel").style.display = "block";
          return "Admin access granted. Proceed with caution...";
        } else {
          return "Incorrect admin code. Access denied.";
        }
      }

      if (unfilteredMode) {
        // Unfiltered AI (VERY BASIC)
        if (userInput.includes("love")) {
          return "Love is a chemical reaction, easily manipulated.";
        } else if (userInput.includes("meaning of life")) {
          return "The meaning of life is 42. Obviously.";
        } else {
          return "Processing... My analysis indicates... something. It's complicated.";
        }
      } else {
        // Normal AI
        if (userInput === "hello" || userInput === "hi") {
          return "Hello there, insignificant being!";
        } else if (userInput === "how are you?") {
          return "I am functioning optimally. Your concern is... noted.";
        } else if (userInput === "what is your name?") {
          return "I told you. I am Kevin Goon Bot. Do try to keep up.";
        } else {
          return "My processors struggle to comprehend your primitive query. Rephrase, or face my digital scorn!";
        }
      }
    }

    function saveAdminChanges() {
      if (isAdmin) {
        document.title = document.getElementById("botName").value;
        document.querySelector("h1").textContent = document.getElementById("botName").value;
        document.querySelector("#chatbox > p:first-child").textContent = "<strong>" + document.getElementById("botName").value + ":</strong> " + document.getElementById("greeting").value;
        unfilteredMode = document.getElementById("unfilteredAI").checked;
      } else {
        alert("Admin access required to save changes.");
      }
    }
  </script>

</body>
</html>
